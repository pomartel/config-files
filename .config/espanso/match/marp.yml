matches:
  - trigger: ";marp"
    replace: |
      ---
      marp: true
      theme: basic
      paginate: true
      title: {{form.title}}
      footer: {{form.title}}
      ---
      <!-- _class: title -->

      # {{form.title}}

      Objectif: $|$

      ---
    vars:
      - name: "form"
        type: form
        params:
          layout: "Title: [[title]]"

  - trigger: ";slide"
    form: |

      # [[titre]]

      - $|$

      ---

  - trigger: ";imgf"
    replace: |
      <!-- _class: fullscreen -->

      ![bg contain](./assets/$|$)

      ---

  - trigger: ";imgc"
    replace: |
      <!-- _class: center -->

      # $|$

      ![etc-passwd h:600px](./assets/)

      ---

  - trigger: ";imgr"
    replace: "![right width:600px](./assets/$|$)"
