# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors
# Format: monitor = [port], resolution, position, scale

# Laptop monitor
monitor=eDP-1, 2880x1800@120, auto, 2

# External monitor
monitor=desc:Dell Inc. DELL U3225QE HHJXB34,highrr, auto, 1.6

# External projector mirror setup (mirror laptop screen to projector)
monitor=HDMI-A-1,preferred,auto,auto,mirror,eDP-1

# Assign workspaces to monitors
workspace = 1, monitor:DP-1
workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-1
workspace = 4, monitor:DP-1
workspace = 5, monitor:DP-1
workspace = 6, monitor:eDP-1
