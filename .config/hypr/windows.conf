# Tag to float and center a window
windowrule = float on, center on, match:tag centered-floating-window

# Keep dialogs centered and floating
windowrule = tag +floating-window, match:class ^(xdg-desktop-portal-gtk)$
windowrule = tag +centered-floating-window, match:title ^(Print|Imprimer)$
windowrule = tag +centered-floating-window, match:class ^(DesktopEditors|org.omarchy.nmtui-connect|nm-connection-editor)$

windowrule = tag -floating-window, tag +centered-floating-window, match:class ^(org.gnome.NautilusPreviewer)$
windowrule = size (monitor_w*0.6) (monitor_h*0.85), match:class ^(org.gnome.NautilusPreviewer)$

windowrule = match:workspace special:todos, float on, size 1200 750, center on

# Match Omarchy's PiP tagging pattern, extended for Brave's localized PiP title.
windowrule = tag +pip, match:title ^(Mode.*PIP.*Picture-in-Picture|.*Picture.?in.?[Pp]icture.*)$
windowrule = move (monitor_w-window_w-20) (monitor_h-window_h-20), match:tag pip
