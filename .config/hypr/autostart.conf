# Autostart scripts and services
# exec-once = uwsm app -- hyprsunset
exec-once = uwsm-app -- solaar -w hide --restart-on-wake-up -b solaar

exec-once = hyprland-monitor-attached ~/bin/hypr-monitor-toggle ~/bin/hypr-monitor-toggle
exec = hypr-monitor-toggle # Also executed when hyprland reloads

# Autostart apps
exec-once = [workspace 3 silent] zeditor
exec-once = [workspace 2 silent] uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
exec-once = [workspace 1] omarchy-launch-browser
exec-once = sleep 4; hyprctl dispatch workspace 1

# Empty the trash once every day
exec-once = trash-empty 30
