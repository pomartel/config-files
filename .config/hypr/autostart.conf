# Extra autostart processes
# exec-once = uwsm-app -- my-service

exec-once = hyprctl dispatch workspace 2

# Autostart scripts and services
exec-once = uwsm app -- hyprsunset
exec-once = sleep 3; uwsm-app -- 1password --silent
exec-once = hyprland-monitor-attached ~/bin/hypr-monitor-toggle ~/bin/hypr-monitor-toggle
exec = hypr-monitor-toggle # Also executed when hyprland reloads

# Autostart apps
exec-once = omarchy-launch-browser
exec-once = omarchy-launch-webapp "https://chatgpt.com"
exec-once = xdg-terminal-exec

# Empty the trash once every day
exec-once = trash-empty 30
