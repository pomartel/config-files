# Autostart scripts and services
# exec-once = uwsm app -- hyprsunset
exec-once = uwsm-app -- solaar -w hide --restart-on-wake-up -b solaar
exec-once = sleep 3; uwsm-app -- 1password --silent

exec-once = hyprland-monitor-attached ~/bin/hypr-monitor-toggle ~/bin/hypr-monitor-toggle
exec = hypr-monitor-toggle # Also executed when hyprland reloads

# Autostart apps
exec-once = hyprctl dispatch exec "[workspace 1 silent] uwsm-app -- omarchy-launch-browser"
exec-once = hyprctl dispatch exec '[workspace 2 silent] uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"'
exec-once = hyprctl dispatch exec "[workspace 3 silent] uwsm-app -- zeditor"
exec-once = sleep 3; hyprctl dispatch workspace 1

# Empty the trash once every day
exec-once = trash-empty 30
