# Application bindings
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" tmux
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser

bindd = SUPER SHIFT, A, ChatGPT, exec, omarchy-launch-webapp https://chatgpt.com --profile-directory=Default

bindd = SUPER SHIFT, B, Browser, exec, omarchy-launch-browser --profile-directory=Default
bindd = SUPER SHIFT ALT, B, Browser (school), exec, omarchy-launch-browser --profile-directory=School
bindd = SUPER SHIFT CTRL, B, Browser (private), exec, omarchy-launch-browser --private

bindd = SUPER SHIFT, C, Calendar Pouding, exec, omarchy-launch-or-focus-webapp brave-calendar https://calendar.google.com/calendar/u/0/r --profile-directory=Default
bindd = SUPER SHIFT ALT, C, Calendar Rosemont, exec, omarchy-launch-or-focus-webapp brave-outlook https://outlook.office.com/calendar/view/month --profile-directory=School

bindd = SUPER SHIFT, E, Email Pouding, exec, omarchy-launch-or-focus-webapp brave-mail https://mail.google.com/mail/u/0/##inbox --profile-directory=Default
bindd = SUPER SHIFT ALT, E, Email Rosemont, exec, omarchy-launch-or-focus-webapp brave-outlook https://outlook.office.com/mail/0/ --profile-directory=School

bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window Downloads
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"

bindd = SUPER SHIFT, G, Messenger, exec, omarchy-launch-or-focus-webapp brave-messenger https://messenger.com --profile-directory=Default
bindd = SUPER SHIFT ALT, G, Microsoft Teams, exec, omarchy-launch-or-focus-webapp brave-teams.microsoft https://teams.microsoft.com/v2/ --profile-directory=School
bindd = SUPER SHIFT CTRL, G, WhatsApp, exec, omarchy-launch-or-focus-webapp brave-web.whatsapp https://web.whatsapp.com/ --profile-directory=Default

bindd = SUPER SHIFT, L, Calibre, exec, gtk-launch calibre-gui 

bindd = SUPER SHIFT, N, Neovim, exec, omarchy-launch-editor

bindd = SUPER SHIFT, M, Music (Spotify), exec, launch-or-focus-special-workspace ^spotify$ music

bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus "^obsidian$" "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"

bindd = SUPER SHIFT, P, Apple Photos, exec, omarchy-launch-or-focus-webapp brave-www.icloud https://www.icloud.com/photos/ --profile-directory=Default

bindd = SUPER SHIFT, T, Todoist, exec, launch-or-focus-special-workspace Todoist brave-app.todoist omarchy-launch-webapp https://app.todoist.com/app/ --profile-directory=Default

bindd = SUPER SHIFT, W, Typora, exec, omarchy-launch-or-focus ^Typora$ "uwsm-app -- typora --enable-wayland-ime"

bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-or-focus-webapp brave-youtube https://youtube.com/ --profile-directory=Default
bindd = SUPER SHIFT ALT, Y, Netflix, exec, omarchy-launch-or-focus-webapp brave-www.netflix https://www.netflix.com/browse --profile-directory=Default

bindd = SUPER SHIFT, X, 1Password, exec, uwsm-app -- 1password

bindd = SUPER SHIFT, Z, Zed Editor, exec, gtk-launch dev.zed.Zed


# Utilities bindings
binddl = SUPER CTRL, P, HDMI Toggle (Projector), exec, hdmi-toggle

binddl = SUPER CTRL, Escape, Suspend system, exec, systemctl suspend
binddl = SUPER CTRL ALT, Escape, Hibernate system, exec, systemctl hibernate

# Confettis!
bindd = SUPER ALT, C, Confettis animation, exec, confetti

# Close windows
unbind = SUPER, Q
bindd = SUPER, Q, Close active window, killactive

# Map SUPER+W to CTRL+W (close tab in browsers)
unbind = SUPER, W
bindd = SUPER, W, Send SUPER+W to CTRL+W, sendshortcut, CTRL, W,

unbind = SUPER, T
bindd = SUPER, T, Send SUPER+T to CTRL+T, sendshortcut, CTRL, T,
bindd = SUPER ALT, T, Toggle window floating/tiling, togglefloating,
