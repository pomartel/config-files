# Application bindings
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"

bindd = SUPER SHIFT, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com" --profile-directory="Default"
bindd = SUPER SHIFT ALT, A, Gemini, exec, omarchy-launch-webapp "https://gemini.google.com/app" --profile-directory="Default"

bindd = SUPER SHIFT, B, Browser, exec, omarchy-launch-browser --profile-directory="Default"
bindd = SUPER SHIFT ALT, B, Browser (School), exec, omarchy-launch-browser --profile-directory="School"
bindd = SUPER SHIFT CTRL, B, Browser (private), exec, omarchy-launch-browser --private

bindd = SUPER SHIFT, C, Calendar Pouding, exec, omarchy-launch-or-focus-webapp "Pouding - Agenda" "https://calendar.google.com/calendar/u/0/r" --profile-directory="Default"
bindd = SUPER SHIFT ALT, C, Calendar Rosemont, exec, omarchy-launch-or-focus-webapp "^Agenda.*Outlook$" "https://outlook.office.com/calendar/view/month" --profile-directory="School"

bindd = SUPER SHIFT, E, Email Pouding, exec, omarchy-launch-or-focus-webapp po@pouding.com "https://mail.google.com/mail/u/0/##inbox" --profile-directory="Default"
bindd = SUPER SHIFT ALT, E, Email Rosemont, exec, omarchy-launch-or-focus-webapp Outlook "https://outlook.office.com/mail/0/" "--profile-directory=School"

bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"

bindd = SUPER SHIFT, G, Messenger, exec, omarchy-launch-or-focus-webapp Messenger "https://messenger.com" --profile-directory="Default"
bindd = SUPER SHIFT ALT, G, Microsoft Teams, exec, omarchy-launch-or-focus-webapp Teams "https://teams.microsoft.com/v2/" --profile-directory="School"
bindd = SUPER SHIFT CTRL, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/" --profile-directory="Default"

bindd = SUPER SHIFT, L, Calibre, exec, gtk-launch calibre-gui 

bindd = SUPER SHIFT, N, Neovim, exec, omarchy-launch-editor

bindd = SUPER SHIFT, M, Music (Spotify), exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus "^obsidian$" "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"

bindd = SUPER SHIFT, P, Apple Photos, exec, omarchy-launch-or-focus-webapp "iCloud Photos" "https://www.icloud.com/photos/" --profile-directory="Default"

bindd = SUPER SHIFT, S, Visual Studio Code, exec, uwsm-app -- code

bindd = SUPER SHIFT, T, Todoist, exec, omarchy-launch-or-focus-webapp Todoist "https://app.todoist.com/app/" --profile-directory="Default"

bindd = SUPER SHIFT, W, Typora, exec, omarchy-launch-or-focus Typora "uwsm-app -- typora --enable-wayland-ime"

bindd = SUPER SHIFT, X, X, exec, omarchy-launch-webapp "https://x.com/"

bindd = SUPER SHIFT, Z, Zed Editor, exec, gtk-launch dev.zed.Zed

bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-or-focus-webapp YouTube "https://youtube.com/" --profile-directory="Default"
bindd = SUPER SHIFT ALT, Y, Netflix, exec, omarchy-launch-or-focus-webapp YouTube "https://www.netflix.com/browse" --profile-directory="Default"

bindd = SUPER SHIFT, numbersign, 1Password, exec, uwsm-app -- 1password


# Utilities bindings
bindd = SUPER CTRL, P, HDMI Toggle (Projector), exec, hdmi-toggle

unbind = SUPER CTRL ALT, T
bindd = SUPER CTRL ALT, T, Show time, exec, notify-send "    $(LC_TIME=fr_CA.UTF-8 date +"%A %H:%M  —  %d %B %Y")"

binddl = SUPER CTRL, Escape, Suspend system, exec, systemctl suspend
binddl = SUPER CTRL ALT, Escape, Hibernate system, exec, systemctl hibernate

# Close windows
unbind = SUPER, Q
bindd = SUPER, Q, Close active window, killactive

# Map SUPER+W to CTRL+W (close tab in browsers)
unbind = SUPER, W
bindd = SUPER, W, Send SUPER+W to CTRL+W, sendshortcut, CTRL, W,


unbind = SUPER, T
bindd = SUPER, T, Send SUPER+T to CTRL+T, sendshortcut, CTRL, T,
bindd = SUPER ALT, T, Toggle window floating/tiling, togglefloating,


# Unbind page up/down because I am pressing them accidentally often
bind = , Page_Up, exec, true
bind = , Page_Down, exec, true

