## The EDIFIER M60 reports a hardware dB range that makes PipeWire's lower
## percentage values collapse into near-silence. Use its raw USB mixer steps
## so the available hardware range is distributed across the volume control.

monitor.alsa.rules = [
  {
    matches = [
      {
        device.name = "alsa_card.usb-bestechnic_EDIFIER_M60_20160406.1-00"
      }
    ]
    actions = {
      update-props = {
        api.alsa.ignore-dB = true
      }
    }
  }
]
