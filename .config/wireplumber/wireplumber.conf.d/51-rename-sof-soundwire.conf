monitor.alsa.rules = [
  {
    matches = [
      {
        node.name = "alsa_output.pci-0000_00_1f.3-platform-sof_sdw.HiFi__Speaker__sink"
      }
    ]
    actions = {
      update-props = {
        node.description = "Laptop Speakers"
        node.nick = "Speakers"
      }
    }
  },
  {
    matches = [
      {
        node.name = "alsa_output.pci-0000_00_1f.3-platform-sof_sdw.HiFi__Headphones__sink"
      }
    ]
    actions = {
      update-props = {
        node.description = "AUX Headphones Jack"
        node.nick = "AUX Headphones Jack"
      }
    }
  },
  {
    matches = [
      {
        node.name = "alsa_input.pci-0000_00_1f.3-platform-sof_sdw.HiFi__Mic__source"
      }
    ]
    actions = {
      update-props = {
        node.description = "Laptop Microphone"
        node.nick = "Microphone"
      }
    }
  },
  {
    matches = [
      {
        node.name = "alsa_input.pci-0000_00_1f.3-platform-sof_sdw.HiFi__Headset__source"
      }
    ]
    actions = {
      update-props = {
        node.description = "Headset Microphone"
        node.nick = "Headset Mic"
      }
    }
  },
  {
    matches = [
      {
        node.name = "alsa_output.pci-0000_00_1f.3-platform-sof_sdw.HiFi__HDMI1__sink"
      }
    ]
    actions = {
      update-props = {
        node.description = "DELL U3225QE Audio"
        node.nick = "DELL U3225QE"
      }
    }
  },
  {
    matches = [
      {
        node.name = "alsa_output.pci-0000_00_1f.3-platform-sof_sdw.HiFi__HDMI2__sink"
      }
    ]
    actions = {
      update-props = {
        node.description = "DisplayPort Audio 2"
        node.nick = "DisplayPort 2"
      }
    }
  },
  {
    matches = [
      {
        node.name = "alsa_output.pci-0000_00_1f.3-platform-sof_sdw.HiFi__HDMI3__sink"
      }
    ]
    actions = {
      update-props = {
        node.description = "DisplayPort Audio 3"
        node.nick = "DisplayPort 3"
      }
    }
  }
]
